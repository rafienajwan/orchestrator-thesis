services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - orchestrator-net

  controller:
    build:
      context: ../..
      dockerfile: Dockerfile.controller
    environment:
      REDIS_URL: redis://redis:6379/0
      REDIS_KEY_PREFIX: orchestrator
      LOG_LEVEL: INFO
    depends_on:
      - redis
    networks:
      - orchestrator-net

  agent-a:
    build:
      context: ../..
      dockerfile: Dockerfile.agent
    environment:
      NODE_ID: node-a
      AGENT_PUBLIC_URL: http://agent-a:8080
      CONTROLLER_BASE_URL: http://controller:8000
      DOCKER_NETWORK_NAME: orchestrator-thesis-net
      LOG_LEVEL: INFO
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - controller
    networks:
      - orchestrator-net

  agent-b:
    build:
      context: ../..
      dockerfile: Dockerfile.agent
    environment:
      NODE_ID: node-b
      AGENT_PUBLIC_URL: http://agent-b:8080
      CONTROLLER_BASE_URL: http://controller:8000
      DOCKER_NETWORK_NAME: orchestrator-thesis-net
      LOG_LEVEL: INFO
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - controller
    networks:
      - orchestrator-net

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - controller
    ports:
      - "8080:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - orchestrator-net

networks:
  orchestrator-net:
    name: orchestrator-thesis-net
    driver: bridge
