# HTTP entry point for mini-orchestrator and active workload.
# Only specific mini-orchestrator control API endpoints are routed to controller FastAPI:
#   /api/health, /api/nodes, /api/events, /api/services, /api/internal/
#
# All other paths are routed to the active workload.
# This is required for Rocket.Chat because frontend assets, runtime config,
# SockJS/WebSocket, and some application API routes are served from the root path.

upstream controller_api {
    server controller:8000;
}

upstream active_workload {
    include /etc/nginx/upstreams/active.conf;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100m;

    # Mini-orchestrator API endpoints
    location /api/health {
        proxy_pass http://controller_api/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/nodes {
        proxy_pass http://controller_api/api/nodes;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/events {
        proxy_pass http://controller_api/api/events;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/services {
        proxy_pass http://controller_api/api/services;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/internal/ {
        proxy_pass http://controller_api/api/internal/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Semua route lain diarahkan ke active workload.
    # Ini dibutuhkan Rocket.Chat karena asset, runtime config,
    # SockJS, dan API aplikasi memakai root path.
    location / {
        proxy_pass http://active_workload;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}
