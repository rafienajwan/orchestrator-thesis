# Nginx entry point for mini-orchestrator controller
# Note: Deployed workloads are NOT directly accessible via this entry point.
# Workload access pattern:
#   1. Query /nodes endpoint to discover agent URLs.
#   2. Query /services/<service_id> to get container IP and agent assignment.
#   3. Access workload via container IP on internal network (for prototype).
# For prod: implement workload service discovery or agent-scoped routes.

server {
    listen 80;
    server_name _;

    # All controller endpoints (services, nodes, events, health, internal)
    location / {
        proxy_pass http://controller:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
